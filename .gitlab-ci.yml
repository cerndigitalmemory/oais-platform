stages:
  - format
  - test
  - tag
  - build
  - deploy-dev
  - deploy-qa
  - deploy-prod
  - maintenance

check-isort:
  stage: format
  image: registry.cern.ch/docker.io/library/python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install wheel==0.45.1
    - pip install isort==5.13
  script:
    - isort --profile black -c --skip "migrations" .

check-black:
  stage: format
  image: registry.cern.ch/docker.io/library/python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install black==24.10
  script:
    - black . --check --exclude "oais_platform/oais/migrations"

django-tests:
  stage: test
  image: registry.cern.ch/docker.io/library/docker:20.10.16
  services:
    - name: registry.cern.ch/docker.io/library/docker:20.10.16-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker info
    - docker-compose -f test-compose.yml up --exit-code-from django
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura 
        path: coverage.xml
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  tags:
    - docker-privileged-xl
  except:
    - schedules

create-tag:
  stage: tag
  image: registry.cern.ch/docker.io/library/python:3.11
  variables:
    PRIVATE_TOKEN: "$PRIVATE_TOKEN"
    BRANCH: "$CI_COMMIT_REF_NAME"
    PROJECT_ID: "$CI_PROJECT_ID"
  script:
    - |
        export VERSION=$(grep "__version__" oais_platform/__init__.py | cut -d'"' -f2)
        echo Version: $VERSION
        pip install python-gitlab
        python scripts/gitlab_tags.py
  rules:
    # When pushed commit has the __init__.py file changed (and it is not a tag)
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG == null
      changes:
        - oais_platform/__init__.py

# Add deploy and trigger jobs for all envs
include:
  - local: .gitlab-ci-common.yml

update_recently_updated_labels:
  stage: maintenance
  image: registry.cern.ch/docker.io/library/python:3.11
  script:
    - pip install python-gitlab
    - python scripts/gitlab_issues.py
  only:
    - schedules
